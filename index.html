<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Prueba de GitHub Pages exitosa!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2da44e; /* El verde clásico de GitHub */
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            color: #57606a;
        }
        .rocket {
            font-size: 3rem;
            animation: float 2s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="rocket">🚀</div>
        <h1>¡Funciona a la perfección!</h1>
        <p>Tu sitio web ya está alojado con éxito en GitHub Pages.</p>
    </div>

</body>
</html>
